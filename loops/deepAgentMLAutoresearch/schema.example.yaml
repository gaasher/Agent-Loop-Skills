# Example schema for deepAgentMLAutoresearch.
# The loop writes a filled-in copy to <sandbox_root>/schema.yaml at setup time.

metric: val_acc
metric_direction: maximize        # minimize or maximize

run_cmd: "/path/to/venv/bin/python train.py"
entrypoint: "/path/to/venv/bin/python train.py"

editable_files:
  - model.py
  - config.yaml

sandbox_root: ./sandbox

iter_strategy: snapshots          # snapshots or branches
run_tag: jun19                    # branches mode only

gate: epochs
budget: 5                         # epochs per run (or minutes if gate: time)

# --- literature grounding ---------------------------------------------------
domain: "small-image classification"   # seeds query phrasing only; does NOT filter results
research_scale: medium                 # low | medium | high | x-high  (see SKILL.md §4)
# Literature toolchain: the shared `literature-search` skill (installed alongside, see SKILL §0).
lit_skill_dir: ~/.claude/skills/literatureSearch
lit_py: python3                        # interpreter for the skill's lit_search.py (stdlib-only, >=3.9)

# Key presence is recorded here at setup (booleans only — actual keys live in the
# gitignored <sandbox_root>/literature/keys.env, never in this file).
literature_tiers:
  s2: true            # S2_API_KEY present (free, recommended)
  openalex_email: true
  sonar: false        # OPENROUTER_API_KEY present (paid)
  bgpt: false         # BGPT_API_KEY present (free 50 then paid)
