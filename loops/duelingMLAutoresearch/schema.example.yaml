# Example schema for duelingMLAutoresearch.
# The loop writes a filled-in copy to <sandbox_root>/schema.yaml at setup time.

# --- shared (identical for both lanes — the honesty anchor) ------------------
metric: val_acc
metric_direction: maximize    # minimize or maximize
gate: epochs
budget: 5                     # epochs per run (or minutes if gate: time)
sandbox_root: ./sandbox
iter_strategy: snapshots      # snapshots or branches (codebase lanes only)

# --- the two lanes ----------------------------------------------------------
# Each lane has a code_location:
#   codebase = edits existing repo files, runs an existing entrypoint.
#   sandbox  = authors + runs its own code inside <sandbox_root>/<lane>/iter<N>/ (nothing added to the repo).
lanes:
  - name: learned             # the ML / learned lane — backed by the existing codebase
    code_location: codebase
    run_cmd: "/path/to/venv/bin/python train.py"
    entrypoint: "/path/to/venv/bin/python train.py"
    editable_files:
      - model.py
      - config.yaml

  - name: classical           # the traditional / algorithmic lane — built entirely in the sandbox
    code_location: sandbox
    entry: "python run.py"    # run from inside <sandbox_root>/classical/iter<N>/
    # no editable_files / run_cmd: the code is authored under <sandbox_root>/classical/iter<N>/

# Both lanes MUST report `metric` on the same held-out set, computed the same way,
# so the head-to-head scoreboard is meaningful.
