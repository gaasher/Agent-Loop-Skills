# Example bindings for the analysis-verify loop.
# The loop writes a filled-in copy of this to <sandbox_root>/loop.run.yaml at setup time.
# You can also fill this in manually and point the loop at it to skip the interactive questions.

draft: ./results_draft.md     # the results/claims document to verify (markdown/text)
dataset: ./trial_data.csv     # read-only ground truth the claims were drawn from

analysis_cmd: python3         # interpreter for checks; stdlib csv/statistics preferred

report: ./sandbox/verified.md # the verified/revised draft this loop produces

sandbox_root: ./sandbox       # absolute or relative path; created if missing; no ../ escapes

budget: 10                    # max iterations before the loop stops
