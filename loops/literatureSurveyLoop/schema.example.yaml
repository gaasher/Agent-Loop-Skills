# Example config for literatureSurveyLoop.
# Copy/fill this in as loop.run.yaml in your working directory (see SKILL.md §1).

# --- the survey question -----------------------------------------------------
question: >
  Methods for parameter-efficient fine-tuning of large language models since 2021 —
  scope: adapters, LoRA-family, prompt/prefix tuning; exclude full fine-tuning baselines.

# --- depth + stopping --------------------------------------------------------
eval_scale: medium        # low | medium | high — queries/fulltext/new-source caps per round
budget: 6                 # max rounds
patience: 2               # stop after this many rounds that each add < min_new new sources
min_new: 2                # saturation threshold: a round is "dry" below this many new matrix-changing sources

# --- outputs -----------------------------------------------------------------
matrix: ./sandbox/matrix.json   # structured matrix (validates schemas/matrix.schema.json); survey.md alongside
sandbox_root: ./sandbox

# --- literature toolchain (shared `literature-search` skill, see SKILL §0) ----
lit_skill_dir: ~/.claude/skills/literatureSearch
lit_py: python3           # any Python >=3.9 for the skill's lit_search.py

# Literature key presence (booleans only); values live in keys.env at the project root.
literature_tiers:
  S2_API_KEY: false       # free, recommended (snippet/cite reliability)
